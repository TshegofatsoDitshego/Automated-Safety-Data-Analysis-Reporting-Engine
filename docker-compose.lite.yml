version: '3.8'

# Lightweight version for development on machines with limited resources
# Uses SQLite instead of PostgreSQL and runs without Celery

services:
  # Redis only (lightweight, needed for caching)
  redis:
    image: redis:7-alpine
    container_name: safety_redis_lite
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - safety_network

  # FastAPI Application only (no separate Celery workers)
  api:
    build:
      context: .
      dockerfile: Dockerfile.lite
    container_name: safety_api_lite
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/safety.db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=true
      - CELERY_TASK_ALWAYS_EAGER=true
      - ENABLE_ML_MODELS=false
      - MAX_BATCH_SIZE=1000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - safety_network

networks:
  safety_network:
    driver: bridge